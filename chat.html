<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simli Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

.simliNick{
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 3s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<select id="renk">
<option value="linear-gradient(270deg,#FFD700,#FFF8DC,#FFD700)">Altın</option>
<option value="linear-gradient(270deg,#FF0000,#FF8C00,#FFFF00)">Ateş</option>
<option value="linear-gradient(270deg,#00FFFF,#0077FF,#00FFFF)">Mavi Neon</option>
<option value="linear-gradient(270deg,#FF69B4,#FFC0CB,#FF69B4)">Pembe</option>
<option value="linear-gradient(270deg,#8A2BE2,#DA70D6,#8A2BE2)">Mor</option>
<option value="linear-gradient(270deg,#00FF00,#003300,#00FF00)">Yeşil</option>
<option value="linear-gradient(270deg,#FFFFFF,#00F0FF,#FFFFFF)">Beyaz Neon</option>
<option value="linear-gradient(270deg,#FFA500,#FF4500,#FFA500)">Turuncu</option>
<option value="linear-gradient(270deg,#FF1493,#FFB6C1,#FF1493)">Fuşya</option>
<option value="linear-gradient(270deg,#1E90FF,#00BFFF,#1E90FF)">Açık Mavi</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let admin=false;
let renk="";

function gir(){
  nick=document.getElementById("nick").value;
  let pass=document.getElementById("adminpass").value;
  renk=document.getElementById("renk").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  let nickHTML = nick;

  if(admin){
    nickHTML = "<span class='simliNick' style='background:"+renk+"'>👑 "+nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+mesaj+"</p>";
}
</script>

</body>
</html>
