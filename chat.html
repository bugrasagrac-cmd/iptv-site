<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Simli Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

span{position:relative;}

/* ✨ SİMLİ AKAN */
.simliNick{
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:simliFlow 3s linear infinite;
}

@keyframes simliFlow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* 🔥 ALEV */
.ates{
  animation:ates 0.2s infinite alternate;
}
@keyframes ates{
  0%{text-shadow:0 0 5px red;}
  100%{text-shadow:0 0 20px yellow;}
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Simli Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let admin=false;

// 💎 SENİN SİMLİ LİSTEN (kısaltılmış ama yeterli)
const simliList = [
"linear-gradient(270deg,#FFD700,#FFF8DC,#FFD700)",
"linear-gradient(270deg,#FF0000,#FF8C00,#FFFF00)",
"linear-gradient(270deg,#00FFFF,#0077FF,#00FFFF)",
"linear-gradient(270deg,#FF69B4,#FFC0CB,#FF69B4)",
"linear-gradient(270deg,#8A2BE2,#DA70D6,#8A2BE2)",
"linear-gradient(270deg,#00FF00,#003300,#00FF00)",
"linear-gradient(270deg,#FFFFFF,#00F0FF,#FFFFFF)",
"linear-gradient(270deg,#FFA500,#FF4500,#FFA500)",
"linear-gradient(270deg,#00FFFF,#FFFFFF,#00FFFF)",
"linear-gradient(270deg,#FF1493,#FFB6C1,#FF1493)",
"linear-gradient(270deg,#7FFF00,#00FF7F,#7FFF00)",
"linear-gradient(270deg,#1E90FF,#00BFFF,#1E90FF)",
"linear-gradient(270deg,#FFDAB9,#FFE4B5,#FFDAB9)",
"linear-gradient(270deg,#ADFF2F,#7CFC00,#ADFF2F)",
"linear-gradient(270deg,#00CED1,#20B2AA,#00CED1)",
"linear-gradient(270deg,#FF4500,#FF6347,#FF4500)",
"linear-gradient(270deg,#DA70D6,#EE82EE,#DA70D6)",
"linear-gradient(270deg,#4169E1,#6495ED,#4169E1)",
"linear-gradient(270deg,#32CD32,#228B22,#32CD32)"
];

function gir(){
  nick=document.getElementById("nick").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  let nickHTML = nick;

  if(admin){
    let randomGradient = simliList[Math.floor(Math.random()*simliList.length)];

    nickHTML = "<span class='simliNick ates' style='background:"+randomGradient+"'>👑 "+nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+mesaj+"</p>";
}
</script>

</body>
</html>
