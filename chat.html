<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* ✨ simli yazı */
.parlak {
  position: relative;
  font-size:28px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 10px white, 0 0 20px cyan;
}

/* ❄️ kar efekti */
.parlak::after {
  content:"❄ ❅ ❄ ❅ ❄";
  position:absolute;
  top:-10px;
  left:0;
  width:100%;
  font-size:14px;
  animation: snow 3s linear infinite;
  opacity:0.8;
}

@keyframes snow {
  0%{transform:translateY(-10px);}
  100%{transform:translateY(25px);}
}

/* ✨ yıldız efekti */
.yildiz {
  position: relative;
  color:yellow;
  text-shadow:0 0 10px yellow;
}

.yildiz::after {
  content:"✨ ✨ ✨";
  position:absolute;
  left:0;
  top:-5px;
  width:100%;
  animation: star 2s infinite;
}

@keyframes star {
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* 🔥 alev */
.ates {
  color:orange;
  text-shadow:0 0 10px red,0 0 20px orange;
}

</style>

</head>

<body>

<h1>💬 Ultra Chat</h1>

<input id="nick" placeholder="Nick yaz">

<br><br>

<select id="efekt">
<option value="parlak">❄️ Kar Simli</option>
<option value="yildiz">✨ Yıldızlı</option>
<option value="ates">🔥 Alev</option>
</select>

<br><br>

<button onclick="gir()">Giriş</button>

<div id="chat" style="display:none;">
  <h2 id="nickgoster"></h2>

  <input id="mesaj" placeholder="Mesaj yaz">
  <button onclick="gonder()">Gönder</button>

  <div id="mesajlar"></div>
</div>

<script>
let nick="";
let efekt="";

function gir(){
  nick=document.getElementById("nick").value;
  efekt=document.getElementById("efekt").value;

  if(!nick){ alert("Nick gir"); return; }

  document.getElementById("chat").style.display="block";

  document.getElementById("nickgoster").innerHTML =
    "<span class='"+efekt+"'>"+nick+"</span>";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;

  if(!mesaj) return;

  document.getElementById("mesajlar").innerHTML +=
    "<p><span class='"+efekt+"'>"+nick+":</span> "+mesaj+"</p>";
}
</script>

</body>
</html>
