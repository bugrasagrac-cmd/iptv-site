<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}

.input input{
  flex:1;
  padding:10px;
  border:none;
}

.input button{
  width:80px;
}

/* ✨ SIMLI */
.parlak{
  background:linear-gradient(90deg,#fff,#0ff,#f0f,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:parla 3s linear infinite;
}
@keyframes parla{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* 🔥 ALEV */
.ates{
  color:orange;
  animation:ates 0.3s infinite alternate;
}
@keyframes ates{
  0%{text-shadow:0 0 5px red}
  100%{text-shadow:0 0 15px yellow}
}

/* ❄️ KAR */
.kar::after{
  content:"❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:snow 3s linear infinite;
}
@keyframes snow{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(20px)}
}

/* 🌈 RAINBOW */
.rainbow{
  background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* 💎 NEON */
.neon{
  color:#0ff;
  text-shadow:0 0 10px #0ff,0 0 20px #0ff;
}

/* ⚡ ELEKTRIK */
.elektrik{
  color:yellow;
  animation:blink 0.2s infinite;
}
@keyframes blink{
  0%{opacity:1}
  50%{opacity:0.5}
  100%{opacity:1}
}

span{position:relative;}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<select id="efekt">
<option value="parlak">✨ Simli</option>
<option value="ates">🔥 Alev</option>
<option value="parlak ates">🔥✨ Alev+Simli</option>
<option value="rainbow">🌈 Rainbow</option>
<option value="rainbow ates">🌈🔥 Rainbow+Alev</option>
<option value="neon">💎 Neon</option>
<option value="neon ates">💎🔥 Neon+Alev</option>
<option value="parlak kar">❄️ Simli Kar</option>
<option value="rainbow kar">🌈❄️ Rainbow Kar</option>
<option value="neon elektrik">💎⚡ Neon Elektrik</option>
<option value="parlak elektrik">✨⚡ Simli Elektrik</option>
<option value="rainbow elektrik">🌈⚡ Rainbow Elektrik</option>
<option value="parlak neon ates">🔥💎✨ FULL</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let efekt="";
let admin=false;

function gir(){
  nick=document.getElementById("nick").value;
  efekt=document.getElementById("efekt").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  if(pass==="1234"){admin=true;} else {admin=false;}

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  if(admin){
    document.getElementById("mesajlar").innerHTML +=
      "<p><span class='"+efekt+"'>👑 "+nick+":</span> "+mesaj+"</p>";
  } else {
    document.getElementById("mesajlar").innerHTML +=
      "<p>"+nick+": "+mesaj+"</p>";
  }
}
</script>

</body>
</html>
