<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:420px;
  height:620px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

.nick{
  display:inline-block;
  animation:acil 0.5s ease-out;
}

@keyframes acil{
  0%{transform:scaleX(0);opacity:0}
  100%{transform:scaleX(1);opacity:1}
}

.anim{
  width:40px;
  vertical-align:middle;
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<select id="anim">
<option value="kid">👦 Çocuk Açıyor</option>
<option value="car">🚗 Araba Geliyor</option>
<option value="fire">🔥 Ateş Patlıyor</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="", admin=false, anim="";

function gir(){
  nick=document.getElementById("nick").value;
  anim=document.getElementById("anim").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  let gif="";

  if(anim==="kid"){
    gif="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif";
  }
  if(anim==="car"){
    gif="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif";
  }
  if(anim==="fire"){
    gif="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif";
  }

  let html = "<p>";

  if(admin){
    html += "<img class='anim' src='"+gif+"'> ";
    html += "<span class='nick'>👑 "+nick+"</span>";
  } else {
    html += nick;
  }

  html += ": " + mesaj + "</p>";

  document.getElementById("mesajlar").innerHTML += html;
}
</script>

</body>
</html>
