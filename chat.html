<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

/* ✨ SIMLI */
.parlak {
  background: linear-gradient(90deg,#fff,#0ff,#f0f,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:parlat 3s linear infinite;
}

@keyframes parlat {
  0%{background-position:0%}
  100%{background-position:300%}
}

/* ❄️ KAR */
.kar::after {
  content:"❄ ❅ ❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:snow 3s linear infinite;
}

@keyframes snow {
  0%{transform:translateY(-10px);}
  100%{transform:translateY(20px);}
}

/* 🔥 ALEV */
.ates {
  color:orange;
  text-shadow:
    0 0 5px red,
    0 0 10px orange,
    0 0 20px red,
    0 0 30px orange;
  animation:atesAnim 0.3s infinite alternate;
}

@keyframes atesAnim {
  0% {
    text-shadow:
      0 0 5px red,
      0 0 10px orange,
      0 0 20px red;
  }
  100% {
    text-shadow:
      0 0 10px yellow,
      0 0 20px red,
      0 0 30px orange;
  }
}

/* ✨ YILDIZ */
.yildiz::after {
  content:"✨ ✨ ✨";
  position:absolute;
  left:0;
  width:100%;
  animation:star 2s infinite;
}

@keyframes star {
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

span {
  position:relative;
}
</style>

</head>

<body>

<h1>💬 Ultra Chat</h1>

<input id="nick" placeholder="Nick yaz"><br><br>

<input id="adminpass" placeholder="Admin şifre (opsiyonel)"><br><br>

<select id="efekt">
<option value="parlak">✨ Simli</option>
<option value="ates">🔥 Alev</option>
<option value="yildiz">✨ Yıldız</option>
<option value="parlak kar">❄️ Simli Kar</option>
</select>

<br><br>

<button onclick="gir()">Giriş</button>

<div id="chat" style="display:none;">
  <h2 id="nickgoster"></h2>

  <input id="mesaj" placeholder="Mesaj yaz">
  <button onclick="gonder()">Gönder</button>

  <div id="mesajlar"></div>
</div>

<script>
let nick="";
let efekt="";
let admin=false;

function gir(){
  nick=document.getElementById("nick").value;
  efekt=document.getElementById("efekt").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick){
    alert("Nick gir");
    return;
  }

  // 🔐 ADMIN
  if(pass === "1234"){
    admin = true;
  } else {
    admin = false;
  }

  document.getElementById("chat").style.display="block";

  if(admin){
    document.getElementById("nickgoster").innerHTML =
      "<span class='"+efekt+"'>👑 "+nick+"</span>";
  } else {
    document.getElementById("nickgoster").innerHTML =
      nick;
  }
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  if(admin){
    document.getElementById("mesajlar").innerHTML +=
      "<p><span class='"+efekt+"'>👑 "+nick+":</span> "+mesaj+"</p>";
  } else {
    document.getElementById("mesajlar").innerHTML +=
      "<p>"+nick+": "+mesaj+"</p>";
  }
}
</script>

</body>
</html>
