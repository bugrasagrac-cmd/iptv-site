<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

/* PANEL */
.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

span{position:relative;display:inline-block;}

/* ✨ SİMLİ */
.simli{
  background:linear-gradient(270deg,#FFD700,#FFF8DC,#FFD700);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 3s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* ⚽ RONALDO SIUUU EFFECT */
.ronaldo{
  animation:siuuu 1s ease-out;
}

@keyframes siuuu{
  0%{
    transform:translateY(-150px) scale(0.5);
    opacity:0;
  }
  40%{
    transform:translateY(0px) scale(1.3);
  }
  60%{
    transform:scale(0.9);
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

/* 💥 PATLAMA */
.ronaldo::after{
  content:"💥";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:-20px;
  animation:patla 1s ease-out;
}

@keyframes patla{
  0%{opacity:1; transform:scale(0);}
  100%{opacity:0; transform:scale(2);}
}

/* 🔊 SIUUU YAZISI */
.ronaldo::before{
  content:"SIUUU!";
  position:absolute;
  top:-30px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  color:yellow;
  animation:yazi 1s ease-out;
}

@keyframes yazi{
  0%{opacity:0; transform:translate(-50%,10px);}
  100%{opacity:1; transform:translate(-50%,-10px);}
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">⚽ SIUUU Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let admin=false;

function gir(){
  nick=document.getElementById("nick").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  let nickHTML = nick;

  if(admin){
    nickHTML = "<span class='ronaldo simli'>👑 "+nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+mesaj+"</p>";
}
</script>

</body>
</html>
