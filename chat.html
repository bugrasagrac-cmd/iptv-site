<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

span{position:relative;}

/* ✨ SIMLI AKIŞ */
.simli{
  background:linear-gradient(90deg,#fff,#0ff,#f0f,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:simli 3s linear infinite;
}
@keyframes simli{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* 🔥 GERÇEK ALEV */
.ates{
  color:orange;
  animation:ates 0.2s infinite alternate;
}
@keyframes ates{
  0%{text-shadow:0 0 5px red,0 0 10px orange;}
  100%{text-shadow:0 0 15px yellow,0 0 25px red;}
}

/* 🌈 AKAN RAINBOW */
.rainbow{
  background:linear-gradient(270deg,red,orange,yellow,green,blue,purple);
  background-size:600%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 4s linear infinite;
}
@keyframes rainbow{
  0%{background-position:0%}
  100%{background-position:600%}
}

/* 💎 NEON NABIZ */
.neon{
  color:#0ff;
  animation:neon 1s infinite alternate;
}
@keyframes neon{
  0%{text-shadow:0 0 5px #0ff;}
  100%{text-shadow:0 0 20px #0ff,0 0 40px #0ff;}
}

/* ⚡ ELEKTRİK TITREME */
.elektrik{
  color:yellow;
  animation:elektrik 0.1s infinite;
}
@keyframes elektrik{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}

/* ❄️ GERÇEK KAR DÜŞME */
.kar::after{
  content:"❄ ❅ ❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:kar 2s linear infinite;
}
@keyframes kar{
  0%{transform:translateY(-15px)}
  100%{transform:translateY(25px)}
}

/* ✨ YILDIZ PARLAMA */
.yildiz::after{
  content:"✨ ✨ ✨";
  position:absolute;
  left:0;
  width:100%;
  animation:yildiz 1.5s infinite;
}
@keyframes yildiz{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

/* 🌀 DÖNEN */
.don{
  display:inline-block;
  animation:don 3s linear infinite;
}
@keyframes don{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

/* 💀 ZIGZAG (farklı his) */
.zigzag{
  display:inline-block;
  animation:zigzag 0.3s infinite;
}
@keyframes zigzag{
  0%{transform:translateX(0)}
  50%{transform:translateX(2px)}
  100%{transform:translateX(-2px)}
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<select id="efekt">
<option value="simli">✨ Simli</option>
<option value="ates">🔥 Alev</option>
<option value="rainbow">🌈 Rainbow</option>
<option value="neon">💎 Neon</option>
<option value="elektrik">⚡ Elektrik</option>
<option value="kar">❄️ Kar</option>
<option value="yildiz">✨ Yıldız</option>
<option value="don">🌀 Dönen</option>
<option value="zigzag">⚡ Titreyen</option>

<!-- GERÇEK FARKLI KOMBO -->
<option value="simli kar">✨❄️ Simli Kar</option>
<option value="rainbow yildiz">🌈✨ Rainbow Yıldız</option>
<option value="neon ates">💎🔥 Neon Alev</option>
<option value="ates kar">🔥❄️ Alev Kar</option>
<option value="rainbow don">🌈🌀 Dönen Rainbow</option>
<option value="simli elektrik">✨⚡ Simli Elektrik</option>
<option value="neon zigzag">💎⚡ Neon Titreme</option>
<option value="rainbow kar yildiz">🌈❄️✨ FULL</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let efekt="";
let admin=false;

function gir(){
  nick=document.getElementById("nick").value;
  efekt=document.getElementById("efekt").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  if(admin){
    document.getElementById("mesajlar").innerHTML +=
      "<p><span class='"+efekt+"'>👑 "+nick+":</span> "+mesaj+"</p>";
  } else {
    document.getElementById("mesajlar").innerHTML +=
      "<p>"+nick+": "+mesaj+"</p>";
  }
}
</script>

</body>
</html>
