<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

/* PANEL */
.panel{
  width:400px;
  height:600px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:#222;
  padding:10px;
  text-align:center;
}

/* CHAT */
.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* INPUT */
.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

/* ✨ 1 SIMLI */
.parlak{
  background:linear-gradient(90deg,#fff,#0ff,#f0f,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:parla 3s linear infinite;
}
@keyframes parla{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* 🔥 2 ALEV */
.ates{
  color:orange;
  animation:ates 0.3s infinite alternate;
}
@keyframes ates{
  0%{text-shadow:0 0 5px red}
  100%{text-shadow:0 0 20px yellow}
}

/* 🌈 3 RAINBOW */
.rainbow{
  background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rain 4s linear infinite;
}
@keyframes rain{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* 💎 4 NEON */
.neon{
  color:#0ff;
  text-shadow:0 0 10px #0ff,0 0 30px #0ff;
}

/* ⚡ 5 ELEKTRIK */
.elektrik{
  color:yellow;
  animation:blink 0.2s infinite;
}
@keyframes blink{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}

/* ❄️ 6 KAR */
.kar::after{
  content:"❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:snow 3s linear infinite;
}
@keyframes snow{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(20px)}
}

/* 🌟 7 YILDIZ */
.yildiz::after{
  content:"✨ ✨ ✨";
  position:absolute;
  left:0;
  width:100%;
  animation:star 2s infinite;
}
@keyframes star{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

/* 💀 EXTRA efektler */
.buyuk{font-size:28px;}
.kucuk{font-size:14px;}
.bold{font-weight:bold;}
.italik{font-style:italic;}
.don{animation:don 3s linear infinite;}
@keyframes don{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

span{position:relative;}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<select id="efekt">
<option value="parlak">✨ Simli</option>
<option value="ates">🔥 Alev</option>
<option value="rainbow">🌈 Rainbow</option>
<option value="neon">💎 Neon</option>
<option value="elektrik">⚡ Elektrik</option>
<option value="parlak ates">🔥✨ Alev+Simli</option>
<option value="rainbow ates">🌈🔥 Rainbow+Alev</option>
<option value="neon elektrik">💎⚡ Neon Elektrik</option>
<option value="parlak kar">❄️ Simli Kar</option>
<option value="rainbow kar">🌈❄️ Rainbow Kar</option>
<option value="parlak yildiz">✨🌟 Simli Yıldız</option>
<option value="rainbow yildiz">🌈🌟 Rainbow Yıldız</option>
<option value="parlak don">🌀 Dönen Simli</option>
<option value="neon don">💎🌀 Dönen Neon</option>
<option value="rainbow don">🌈🌀 Dönen Rainbow</option>
<option value="parlak bold">✨ Kalın Simli</option>
<option value="rainbow italik">🌈 Eğik Rainbow</option>
<option value="parlak buyuk">✨ Büyük Simli</option>
<option value="ates buyuk">🔥 Büyük Alev</option>
<option value="neon kucuk">💎 Küçük Neon</option>
<option value="rainbow bold">🌈 Kalın Rainbow</option>
<option value="parlak elektrik">✨⚡ Simli Elektrik</option>
<option value="rainbow elektrik">🌈⚡ Rainbow Elektrik</option>
<option value="neon kar">💎❄️ Neon Kar</option>
<option value="ates yildiz">🔥✨ Alev Yıldız</option>
<option value="parlak kar yildiz">❄️✨ FULL KAR</option>
<option value="rainbow kar yildiz">🌈❄️ FULL RAINBOW KAR</option>
<option value="parlak neon ates">🔥💎✨ FULL COMBO</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="";
let efekt="";
let admin=false;

function gir(){
  nick=document.getElementById("nick").value;
  efekt=document.getElementById("efekt").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  if(admin){
    document.getElementById("mesajlar").innerHTML +=
      "<p><span class='"+efekt+"'>👑 "+nick+":</span> "+mesaj+"</p>";
  } else {
    document.getElementById("mesajlar").innerHTML +=
      "<p>"+nick+": "+mesaj+"</p>";
  }
}
</script>

</body>
</html>
