<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:520px;
  height:680px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

.adminPanel{
  background:#000;
  padding:10px;
  display:none;
}

.simli{
  background:linear-gradient(270deg,#fff,#0ff,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 3s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}

.kar::after{
  content:"❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:kar 2s linear infinite;
}

@keyframes kar{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(15px)}
}

span{position:relative;}
</style>
</head>

<body>

<div id="login">
<input id="nick" placeholder="Nick"><br><br>
<input id="pass" placeholder="Şifre"><br><br>
<button id="girisBtn">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">

<div class="header">💬 Ultra Chat</div>

<div id="mesajlar" class="mesajlar"></div>

<div class="input">
<input id="mesaj" placeholder="Mesaj yaz">
<button id="gonderBtn">Gönder</button>
</div>

<div id="adminPanel" class="adminPanel">
<input id="hedef" placeholder="Nick yaz"><br><br>

<button id="adminBtn"🆑 Admin Yap</button>
<button id="modBtn">🛡 Mod Yap</button>
<button id="rolSilBtn">❌ Rol Kaldır</button>

<br><br>

<button id="banBtn">🚫 Sustur</button>
<button id="unbanBtn">✅ Sustur Kaldır</button>

<br><br>

<div id="liste"></div>
</div>

</div>

<script>
let user = { nick:"", rol:"user" };

let users = JSON.parse(localStorage.getItem("users") || "{}");
let bans = JSON.parse(localStorage.getItem("bans") || "[]");

function kaydet(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("bans", JSON.stringify(bans));
  listeGuncelle();
}

function gir(){
  let n = document.getElementById("nick").value;
  let p = document.getElementById("pass").value;

  if(!n){
    alert("Nick gir");
    return;
  }

  user.nick = n;

  if(users[n]){
    user.rol = users[n];
  }

  if(p === "1234"){
    user.rol = "admin";
    users[n] = "admin";
    kaydet();
  }

  if(user.rol === "admin"){
    document.getElementById("adminPanel").style.display="block";
  }

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";

  listeGuncelle();
}

function gonder(){
  let msg = document.getElementById("mesaj").value;
  if(!msg) return;

  if(bans.includes(user.nick)){
    alert("Susturuldun");
    return;
  }

  let nickHTML = user.nick;

  if(user.rol === "admin"){
    nickHTML = "<span class='simli kar'>👑 "+user.nick+"</span>";
  }

  if(user.rol === "mod"){
    nickHTML = "<span class='simli'>🛡 "+user.nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+msg+"</p>";
}

function adminYap(){
  let h = document.getElementById("hedef").value;
  if(!h) return;
  users[h] = "admin";
  kaydet();
}

function modYap(){
  let h = document.getElementById("hedef").value;
  if(!h) return;
  users[h] = "mod";
  kaydet();
}

function rolKaldir(){
  let h = document.getElementById("hedef").value;
  if(!h) return;
  delete users[h];
  kaydet();
}

function banla(){
  let h = document.getElementById("hedef").value;
  if(!h) return;
  if(!bans.includes(h)){
    bans.push(h);
    kaydet();
  }
}

function unban(){
  let h = document.getElementById("hedef").value;
  if(!h) return;
  bans = bans.filter(u => u !== h);
  kaydet();
}

function listeGuncelle(){
  let html = "<b>👥 Roller:</b><br>";
  for(let u in users){
    html += u + " - " + users[u] + "<br>";
  }
  html += "<br><b>🚫 Banlılar:</b><br>";
  bans.forEach(b => html += b + "<br>");
  document.getElementById("liste").innerHTML = html;
}

/* EVENTLER */
document.getElementById("girisBtn").onclick = gir;
document.getElementById("gonderBtn").onclick = gonder;
document.getElementById("adminBtn").onclick = adminYap;
document.getElementById("modBtn").onclick = modYap;
document.getElementById("rolSilBtn").onclick = rolKaldir;
document.getElementById("banBtn").onclick = banla;
document.getElementById("unbanBtn").onclick = unban;
</script>

</body>
</html>
