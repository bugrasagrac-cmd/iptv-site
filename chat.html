<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:420px;
  height:620px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

span{position:relative;display:inline-block}

/* ✨ simli */
.simli{
  background:linear-gradient(270deg,#FFD700,#fff,#FFD700);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 3s linear infinite;
}
@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* ⚽ giriş animasyonu */
.giris{
  animation:giris 0.8s ease-out;
}
@keyframes giris{
  0%{transform:translateY(-100px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}

/* 🚗 sağdan giriş */
.araba{
  animation:araba 0.8s ease-out;
}
@keyframes araba{
  0%{transform:translateX(-200px);opacity:0}
  100%{transform:translateX(0);opacity:1}
}

/* 💥 patlama */
.patla::after{
  content:"💥";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:-15px;
  animation:patla 0.8s;
}
@keyframes patla{
  0%{opacity:1;transform:scale(0)}
  100%{opacity:0;transform:scale(2)}
}

/* 🎉 yıldız */
.yildiz::after{
  content:"✨✨";
  position:absolute;
  left:0;
  width:100%;
  animation:yildiz 1s infinite;
}
@keyframes yildiz{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<div>
<input id="nick" placeholder="Nick"><br><br>
<input id="adminpass" placeholder="Admin şifre"><br><br>

<!-- 🎭 KARAKTER -->
<select id="char">
<option value="⚽">⚽ Futbolcu</option>
<option value="🔥">🔥 Ateş Adam</option>
<option value="🚗">🚗 Araba</option>
<option value="👑">👑 Kral</option>
<option value="😈">😈 Şeytan</option>
<option value="🤖">🤖 Robot</option>
</select>

<br><br>

<!-- 🎬 ANİMASYON -->
<select id="anim">
<option value="giris">⚽ Yukarıdan Giriş</option>
<option value="araba">🚗 Soldan Giriş</option>
<option value="giris patla">💥 Giriş + Patlama</option>
<option value="giris yildiz">✨ Parlama</option>
<option value="araba patla">🚗💥 Araba Patlama</option>
</select>

<br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">
  <div class="header">💬 Chat</div>

  <div id="mesajlar" class="mesajlar"></div>

  <div class="input">
    <input id="mesaj" placeholder="Mesaj yaz">
    <button onclick="gonder()">Gönder</button>
  </div>
</div>

<script>
let nick="", admin=false, char="", anim="";

function gir(){
  nick=document.getElementById("nick").value;
  char=document.getElementById("char").value;
  anim=document.getElementById("anim").value;
  let pass=document.getElementById("adminpass").value;

  if(!nick) return;

  admin = (pass==="1234");

  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let mesaj=document.getElementById("mesaj").value;
  if(!mesaj) return;

  let nickHTML = nick;

  if(admin){
    nickHTML = "<span class='"+anim+" simli'>"+char+" "+nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+mesaj+"</p>";
}
</script>

</body>
</html>
