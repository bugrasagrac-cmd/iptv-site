<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Chat</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
  color:white;
}

.panel{
  width:520px;
  height:680px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.header{
  background:#222;
  padding:10px;
  text-align:center;
}

.mesajlar{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.input{
  display:flex;
}
.input input{flex:1;padding:10px;border:none;}
.input button{width:80px;}

.adminPanel{
  background:#000;
  padding:10px;
  display:none;
}

/* ✨ SİMLİ */
.simli{
  background:linear-gradient(270deg,#fff,#0ff,#fff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 3s linear infinite;
}
@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* ❄️ KAR */
.kar::after{
  content:"❄ ❅ ❄";
  position:absolute;
  left:0;
  width:100%;
  animation:kar 2s linear infinite;
}
@keyframes kar{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(15px)}
}

span{position:relative;}
</style>
</head>

<body>

<div id="login">
<input id="nick" placeholder="Nick"><br><br>
<input id="pass" placeholder="Şifre"><br><br>
<button onclick="gir()">Giriş</button>
</div>

<div class="panel" id="chat" style="display:none;">

<div class="header">💬 Ultra Chat</div>

<div id="mesajlar" class="mesajlar"></div>

<div class="input">
<input id="mesaj" placeholder="Mesaj yaz">
<button onclick="gonder()">Gönder</button>
</div>

<div id="adminPanel" class="adminPanel">
<input id="hedef" placeholder="Nick yaz">
<button onclick="adminYap()">👑 Admin Yap</button>
<button onclick="modYap()">🛡 Mod Yap</button>
<button onclick="banla()">🚫 Sustur</button>
</div>

</div>

<script>
let user = {
  nick:"",
  rol:"user"
};

let users = JSON.parse(localStorage.getItem("users") || "{}");
let bans = JSON.parse(localStorage.getItem("bans") || "[]");

function kaydet(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("bans", JSON.stringify(bans));
}

function gir(){
  let n = document.getElementById("nick").value;
  let p = document.getElementById("pass").value;

  if(!n) return;

  user.nick = n;

  // kayıtlı rol
  if(users[n]){
    user.rol = users[n];
  }

  // admin şifre
  if(p === "1234"){
    user.rol = "admin";
    users[n] = "admin";
    kaydet();
  }

  if(user.rol === "admin"){
    document.getElementById("adminPanel").style.display="block";
  }

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";
}

function gonder(){
  let msg = document.getElementById("mesaj").value;
  if(!msg) return;

  if(bans.includes(user.nick)){
    alert("Susturuldun");
    return;
  }

  let nickHTML = user.nick;

  if(user.rol === "admin"){
    nickHTML = "<span class='simli kar'>👑 "+user.nick+"</span>";
  }

  if(user.rol === "mod"){
    nickHTML = "<span class='simli'>🛡 "+user.nick+"</span>";
  }

  document.getElementById("mesajlar").innerHTML +=
    "<p>"+nickHTML+": "+msg+"</p>";
}

function adminYap(){
  let hedef = document.getElementById("hedef").value;
  if(!hedef) return;

  users[hedef] = "admin";
  kaydet();

  if(hedef === user.nick){
    user.rol = "admin";
    document.getElementById("adminPanel").style.display="block";
  }

  alert("Admin verildi");
}

function modYap(){
  let hedef = document.getElementById("hedef").value;
  if(!hedef) return;

  users[hedef] = "mod";
  kaydet();

  if(hedef === user.nick){
    user.rol = "mod";
  }

  alert("Mod verildi");
}

function banla(){
  let hedef = document.getElementById("hedef").value;
  if(!hedef) return;

  if(!bans.includes(hedef)){
    bans.push(hedef);
    kaydet();
  }

  alert("Susturuldu");
}
</script>

</body>
</html>
