<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gelişmiş Admin Panel</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
}

/* NAV */
.nav {
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* SITE */
#site {
    padding:30px;
}

.card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* ADMIN PANEL */
#adminPanel {
    position:fixed;
    right:20px;
    bottom:20px;
    width:320px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    display:none;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
}

button {
    cursor:pointer;
}

.btn {
    padding:10px;
    width:100%;
    border:none;
    background:green;
    color:white;
    border-radius:6px;
}

.delete {
    background:red;
    color:white;
    border:none;
    padding:5px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="nav">
    <div>🔥 Benim Site</div>
    <button onclick="openAdmin()">Admin</button>
</div>

<!-- SITE -->
<div id="site"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

    <div id="loginBox">
        <h3>Admin Giriş</h3>
        <input type="password" id="pass" placeholder="Şifre">
        <button class="btn" onclick="login()">Giriş</button>
    </div>

    <div id="panelBox" style="display:none;">
        <h3>Yeni Yazı</h3>
        <textarea id="text" placeholder="Yazı gir..."></textarea>
        <button class="btn" onclick="addPost()">Ekle</button>
    </div>

</div>

<script>

let password = "1234"; // admin şifresi

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// siteyi yükle
function render() {
    let site = document.getElementById("site");
    site.innerHTML = "";

    posts.forEach((p, i) => {
        site.innerHTML += `
        <div class="card">
            <div>${p}</div>
        </div>`;
    });

    localStorage.setItem("posts", JSON.stringify(posts));
}
render();

// admin aç
function openAdmin() {
    document.getElementById("adminPanel").style.display = "block";
}

// login
function login() {
    let pass = document.getElementById("pass").value;

    if(pass === password) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panelBox").style.display = "block";
    } else {
        alert("Hatalı şifre!");
    }
}

// yazı ekle
function addPost() {
    let text = document.getElementById("text").value;

    if(text.trim() === "") return;

    posts.push(text);
    document.getElementById("text").value = "";

    render();
}

// sil (extra gizli fonksiyon)
document.addEventListener("click", function(e){
    if(e.target.classList.contains("card")){
        let index = Array.from(e.target.parentNode.children).indexOf(e.target);
    }
});

</script>

</body>
</html>
