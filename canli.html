<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel Site</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

/* Üst bar */
.nav {
    background: #222;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.nav button {
    background: #ff3b3b;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* Site alanı */
#site {
    padding: 40px;
    font-size: 22px;
}

/* Admin panel */
#adminPanel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 300px;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    padding: 15px;
    display: none;
}

textarea {
    width: 100%;
    height: 120px;
}

button.save {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="nav">
    <div>Benim Site</div>
    <button onclick="toggleAdmin()">Admin Panel</button>
</div>

<div id="site">Buraya yazdığın şey gelecek...</div>

<div id="adminPanel">
    <h3>Admin Panel</h3>
    <textarea id="textInput" placeholder="Siteye yazı yaz..."></textarea>
    <button class="save" onclick="kaydet()">Kaydet</button>
</div>

<script>
// sayfayı yükle
window.onload = function() {
    let saved = localStorage.getItem("siteText");
    if(saved) {
        document.getElementById("site").innerText = saved;
    }
};

// panel aç/kapat
function toggleAdmin() {
    let panel = document.getElementById("adminPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// kaydet
function kaydet() {
    let text = document.getElementById("textInput").value;

    document.getElementById("site").innerText = text;
    localStorage.setItem("siteText", text);

    alert("Site güncellendi!");
}
</script>

</body>
</html>
