<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Social CMS</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f1f1f1;
}

.nav{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* SITE */
#site{
    padding:20px;
}

.post{
    background:white;
    margin-bottom:20px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.title{
    font-size:20px;
    font-weight:bold;
}

.desc{
    margin-top:5px;
    color:#444;
}

/* IMAGE GRID */
.gallery{
    display:flex;
    overflow-x:auto;
    gap:10px;
    margin-top:10px;
}

.gallery img{
    width:200px;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    flex-shrink:0;
}

/* ADMIN */
#adminPanel{
    position:fixed;
    right:20px;
    bottom:20px;
    width:340px;
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    display:none;
}

input, textarea{
    width:100%;
    margin-top:8px;
    margin-bottom:10px;
    padding:10px;
}

button{
    cursor:pointer;
}

.btn{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
}

.delete{
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="nav">
    <div>🔥 Multi Photo CMS</div>
    <button onclick="openAdmin()">Admin</button>
</div>

<div id="site"></div>

<!-- ADMIN -->
<div id="adminPanel">

    <div id="loginBox">
        <h3>Admin Giriş</h3>
        <input type="password" id="pass" placeholder="Şifre">
        <button class="btn" onclick="login()">Giriş</button>
    </div>

    <div id="panelBox" style="display:none;">
        <h3>Yeni Post</h3>

        <input type="text" id="title" placeholder="Başlık">
        <textarea id="desc" placeholder="Açıklama"></textarea>

        <input type="file" id="imgs" accept="image/*" multiple>

        <button class="btn" onclick="addPost()">Paylaş</button>
    </div>

</div>

<script>

let password = "1234";

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// render
function render(){
    let site = document.getElementById("site");
    site.innerHTML = "";

    posts.forEach((p,i)=>{
        site.innerHTML += `
        <div class="post">
            <div class="title">${p.title}</div>
            <div class="desc">${p.desc}</div>

            <div class="gallery">
                ${p.images.map(img => `<img src="${img}">`).join("")}
            </div>

            <button class="delete" onclick="del(${i})">Sil</button>
        </div>
        `;
    });

    localStorage.setItem("posts", JSON.stringify(posts));
}
render();

// admin aç
function openAdmin(){
    document.getElementById("adminPanel").style.display="block";
}

// login
function login(){
    let pass = document.getElementById("pass").value;

    if(pass === password){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panelBox").style.display="block";
    } else {
        alert("Hatalı şifre!");
    }
}

// post ekle (20-25 foto destekli)
function addPost(){
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let files = document.getElementById("imgs").files;

    if(!title && !desc && files.length === 0) return;

    let images = [];

    if(files.length > 25){
        alert("En fazla 25 fotoğraf yükleyebilirsin!");
        return;
    }

    let loaded = 0;

    if(files.length === 0){
        savePost(title, desc, []);
        return;
    }

    for(let i=0;i<files.length;i++){
        let reader = new FileReader();

        reader.onload = function(e){
            images.push(e.target.result);
            loaded++;

            if(loaded === files.length){
                savePost(title, desc, images);
            }
        }

        reader.readAsDataURL(files[i]);
    }
}

function savePost(title, desc, images){
    posts.unshift({
        title,
        desc,
        images
    });

    document.getElementById("title").value="";
    document.getElementById("desc").value="";
    document.getElementById("imgs").value="";

    render();
}

// sil
function del(i){
    posts.splice(i,1);
    render();
}

</script>

</body>
</html>
