<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini CMS</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.nav{
    background:#111;
    color:#fff;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

#site{
    padding:20px;
}

.card{
    background:white;
    margin-bottom:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}

/* ADMIN */
#adminPanel{
    position:fixed;
    right:20px;
    bottom:20px;
    width:320px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    display:none;
}

input, textarea{
    width:100%;
    margin-top:8px;
    margin-bottom:10px;
    padding:10px;
}

button{
    cursor:pointer;
}

.btn{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="nav">
    <div>🔥 Mini CMS</div>
    <button onclick="openAdmin()">Admin</button>
</div>

<div id="site"></div>

<!-- ADMIN -->
<div id="adminPanel">

    <div id="loginBox">
        <h3>Admin Giriş</h3>
        <input type="password" id="pass" placeholder="Şifre">
        <button class="btn" onclick="login()">Giriş</button>
    </div>

    <div id="panelBox" style="display:none;">
        <h3>Yeni Post</h3>

        <textarea id="text" placeholder="Yazı..."></textarea>

        <input type="file" id="img" accept="image/*">

        <button class="btn" onclick="addPost()">Paylaş</button>
    </div>

</div>

<script>

let password = "1234";

let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// render
function render(){
    let site = document.getElementById("site");
    site.innerHTML = "";

    posts.forEach((p, i) => {
        site.innerHTML += `
        <div class="card">
            <div>${p.text}</div>
            ${p.img ? `<img src="${p.img}">` : ""}
            <button class="delete" onclick="del(${i})">Sil</button>
        </div>
        `;
    });

    localStorage.setItem("posts", JSON.stringify(posts));
}
render();

// admin aç
function openAdmin(){
    document.getElementById("adminPanel").style.display="block";
}

// login
function login(){
    let pass = document.getElementById("pass").value;

    if(pass === password){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("panelBox").style.display="block";
    } else {
        alert("Hatalı şifre");
    }
}

// post ekle
function addPost(){
    let text = document.getElementById("text").value;
    let file = document.getElementById("img").files[0];

    if(text.trim()=="" && !file) return;

    if(file){
        let reader = new FileReader();

        reader.onload = function(e){
            posts.unshift({
                text:text,
                img:e.target.result
            });
            render();
        }

        reader.readAsDataURL(file);
    } else {
        posts.unshift({
            text:text,
            img:null
        });
        render();
    }

    document.getElementById("text").value="";
    document.getElementById("img").value="";
}

// sil
function del(i){
    posts.splice(i,1);
    render();
}

</script>

</body>
</html>
