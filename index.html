<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>HLS Çalışan Test</title>
</head>
<body>

<h3>🎥 HLS Test</h3>

<video id="video" controls style="width:600px; background:black;"></video>

<br><br>

<button onclick="play()">Test Videoyu Oynat</button>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function play() {
  const video = document.getElementById("video");
  const url = "https://storage.googleapis.com/shaka-demo-assets/angel-one-hls/hls.m3u8";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });
  } else {
    video.src = url;
    video.play();
  }
}
</script>

</body>
</html>
