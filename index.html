<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ana Sayfa</title>

<style>
body{margin:0;font-family:Arial;background:#eef0f3;}
.nav{background:#111;color:#fff;padding:15px;display:flex;justify-content:space-between;}
.container{padding:20px;}
.post{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
img,video{width:100%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="nav">
<div>Ana Sayfa</div>
<a href="admin.html" style="color:white;">Admin</a>
</div>

<div class="container" id="feed"></div>

<script>

let posts = [];

function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p=>{
        let media = "";

        (p.media || []).forEach(m=>{
            if(m.type==="image"){
                media += `<img src="${m.data}">`;
            } else {
                media += `<video controls src="${m.data}"></video>`;
            }
        });

        feed.innerHTML += `
        <div class="post">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            ${media}
        </div>`;
    });
}

/* 🔥 REAL-TIME FIX */
function sync(){
    let newData = JSON.parse(localStorage.getItem("posts") || "[]");

    if(JSON.stringify(newData) !== JSON.stringify(posts)){
        posts = newData;
        render();
    }
}

setInterval(sync, 500); // yarım saniyede kontrol
sync();

</script>

</body>
</html>
