<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Site Builder</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

textarea {
  width: 80%;
  height: 120px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
}

pre {
  width: 80%;
  margin: auto;
  margin-top: 20px;
  background: black;
  color: lime;
  padding: 10px;
  text-align: left;
  height: 300px;
  overflow: auto;
}
</style>
</head>

<body>

<h2>🤖 AI Site Builder (Tek Dosya)</h2>

<textarea id="prompt" placeholder="Örn: kahve dükkanı sitesi yap"></textarea>
<br>
<button onclick="generate()">Site Oluştur</button>

<pre id="output">Hazır...</pre>

<script>
function generate() {
  const text = document.getElementById("prompt").value.toLowerCase();

  let result = "";

  // 🧠 DEMO AI LOGIC (backend yoksa fallback)
  if (text.includes("kahve")) {
    result = `
<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; text-align:center; }
header { background:brown; color:white; padding:20px; }
button { padding:10px; background:brown; color:white; border:none; }
</style>
</head>
<body>

<header>
<h1>Kahve Dükkanı</h1>
</header>

<p>En iyi kahveler burada ☕</p>
<button>Sipariş Ver</button>

</body>
</html>`;
  }

  else if (text.includes("e-ticaret")) {
    result = `
<!DOCTYPE html>
<html>
<body>
<h1>E-Ticaret Sitesi</h1>
<div>Ürün 1 - 100₺</div>
<div>Ürün 2 - 200₺</div>
</body>
</html>`;
  }

  else {
    result = `
<!DOCTYPE html>
<html>
<body>
<h1>Genel Site</h1>
<p>AI basit şablon oluşturdu</p>
</body>
</html>`;
  }

  document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
