<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AI Site Builder</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; text-align:center; }
    textarea { width:80%; height:100px; }
    pre { background:#000; color:#0f0; padding:10px; text-align:left; width:80%; margin:auto; overflow:auto; }
  </style>
</head>
<body>

<h2>🤖 Gerçek AI Site Builder</h2>

<textarea id="prompt" placeholder="Örn: modern kahve sitesi yap"></textarea>
<br>
<button onclick="generate()">Site Üret</button>

<h3>📦 Üretilen Kod</h3>
<pre id="output">Bekleniyor...</pre>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  document.getElementById("output").innerText = "AI düşünüyor...";

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        {
          role: "system",
          content: "Sen bir web geliştiricisisin. Sadece HTML, CSS ve JS içeren tam çalışan bir web sitesi kodu üret."
        },
        {
          role: "user",
          content: prompt
        }
      ]
    })
  });

  const data = await response.json();

  const code = data.choices[0].message.content;

  document.getElementById("output").innerText = code;
}
</script>

</body>
</html>
