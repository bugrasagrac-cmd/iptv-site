<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>10'lu Sıralı Downloader</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #333;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      background: white;
      border-radius: 6px;
      min-height: 40px;
    }
  </style>
</head>

<body>

<h2>⚡ 10 Link Sıralı Downloader</h2>

<div id="inputs"></div>

<button onclick="start()">İNDİRMEYİ BAŞLAT</button>

<div class="status" id="status">Hazır</div>

<script>
  // 10 input oluştur
  const container = document.getElementById("inputs");

  for (let i = 0; i < 10; i++) {
    const input = document.createElement("input");
    input.placeholder = "Link " + (i + 1);
    input.id = "u" + i;
    container.appendChild(input);
  }

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  async function download(url, i) {
    const res = await fetch(url);
    const blob = await res.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "file_" + (i + 1);
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  async function start() {
    const status = document.getElementById("status");

    for (let i = 0; i < 10; i++) {
      const url = document.getElementById("u" + i).value;

      if (!url) continue;

      status.innerText = "İndiriliyor: " + (i + 1);

      try {
        await download(url, i);
      } catch (e) {
        status.innerText = "Hata oluştu: " + (i + 1);
      }

      await sleep(700);
    }

    status.innerText = "Bitti ✅";
  }
</script>

</body>
</html>
