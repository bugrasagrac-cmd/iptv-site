<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Site</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box {
  border:1px solid white;
  margin:10px;
  padding:10px;
}
</style>

</head>

<body>

<h1>KANALLAR</h1>

<div id="liste"></div>

<script>
const supabase = window.supabase.createClient(
  "https://ycjhdiyvpymwlbycaznz.supabase.co",
  "sb_publishable_LcVi575CzFILIXI4-I9S7A_ZrptwTgn"
);

async function yukle(){
  let { data } = await supabase
    .from("channels")
    .select("*");

  let html = "";

  data.forEach(x=>{
    html += `
      <div class="box">
        <h3>${x.name}</h3>
        <video src="${x.url}" controls width="300"></video>
      </div>
    `;
  });

  document.getElementById("liste").innerHTML = html;
}

yukle();
</script>

</body>
</html>
