<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Site Builder Demo</title>
</head>
<body>

<h2>🤖 Site Üretici</h2>

<textarea id="prompt" rows="4" cols="50" placeholder="Ne sitesi istiyorsun?"></textarea>
<br>
<button onclick="generate()">Site Oluştur</button>

<pre id="output"></pre>

<script>
function generate() {
  const input = document.getElementById("prompt").value.toLowerCase();

  let code = "";

  if (input.includes("kahve")) {
    code = `
<html>
  <h1>Kahve Dükkanı</h1>
  <p>En iyi kahveler burada</p>
</html>`;
  }

  else if (input.includes("e-ticaret")) {
    code = `
<html>
  <h1>Mağaza</h1>
  <p>Ürün listesi burada</p>
</html>`;
  }

  else {
    code = "Genel site şablonu oluşturuldu";
  }

  document.getElementById("output").innerText = code;
}
</script>

</body>
</html>
