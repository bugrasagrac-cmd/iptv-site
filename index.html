<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>HLS Video Oynatıcı (Eğitim)</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .container {
      width: 700px;
      margin: auto;
      margin-top: 20px;
    }

    video {
      width: 100%;
      background: black;
      border-radius: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 15px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<h2>🎥 Eğitim Amaçlı HLS Video Oynatıcı</h2>

<div class="container">

  <video id="video" controls></video>

  <br>

  <input id="url" placeholder=".m3u8 video linki gir (HLS)">
  <button onclick="play()">Oynat</button>

  <div class="info">
    Sadece izinli / açık HLS (.m3u8) yayınlar çalışır.
  </div>

</div>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function play() {
  const url = document.getElementById("url").value;
  const video = document.getElementById("video");

  if (!url) {
    alert("Link gir!");
    return;
  }

  if (url.includes(".m3u8")) {

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
      });
    } 
    else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = url;
      video.play();
    } 
    else {
      alert("Tarayıcı HLS desteklemiyor");
    }

  } else {
    alert("Sadece .m3u8 (HLS) link gir");
  }
}
</script>

</body>
</html>
