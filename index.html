<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Site</title>

<style>
body{margin:0;font-family:Arial;background:#eef0f3;}
.nav{background:#111;color:white;padding:15px;display:flex;justify-content:space-between;}
.container{padding:20px;}
.post{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
img,video{width:100%;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="nav">
<div>🔥 SITE</div>
<a href="admin.html" style="color:white;">Admin</a>
</div>

<div class="container" id="feed"></div>

<script>

let posts = [];

function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p=>{
        let media = "";

        (p.media||[]).forEach(m=>{
            media += m.type==="image"
                ? `<img src="${m.data}">`
                : `<video controls src="${m.data}"></video>`;
        });

        feed.innerHTML += `
        <div class="post">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            ${media}
        </div>`;
    });
}

/* 🔥 GERÇEK SYNC */
function sync(){
    let data = localStorage.getItem("posts");
    if(!data) return;

    let newPosts = JSON.parse(data);

    if(JSON.stringify(newPosts) !== JSON.stringify(posts)){
        posts = newPosts;
        render();
    }
}

setInterval(sync, 300);
sync();

</script>

</body>
</html>
