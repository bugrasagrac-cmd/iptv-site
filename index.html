<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IPTV Site</title>
</head>

<body style="background:black;color:white;text-align:center">

<h1>KANALLAR</h1>

<div id="liste"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://ycjhdiyvpymwlbycaznz.supabase.co",
  "sb_publishable_LcVi575CzFILIXI4-I9S7A_ZrptwTgn"
);

async function yukle(){
  let { data, error } = await supabase
    .from("channels")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  let alan = document.getElementById("liste");
  alan.innerHTML = "";

  if(data){
    data.forEach(x=>{
      alan.innerHTML += `
        <div style="margin:15px;padding:10px;border:1px solid white;">
          <h3>${x.name}</h3>
          <video src="${x.url}" controls width="300"></video>
        </div>
      `;
    });
  }
}

yukle();
</script>

</body>
</html>
