<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Mini Sosyal Medya (Eğitim)</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      width: 700px;
      margin: auto;
      margin-top: 30px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 15px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .feed {
      margin-top: 20px;
    }

    .post {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>📱 Mini Sosyal Medya Platformu (YouTube + Instagram)</h2>

  <div class="container">

    <input id="url" placeholder="YouTube veya Instagram linki yapıştır">
    <button onclick="addPost()">Paylaş</button>

    <div class="feed" id="feed"></div>

  </div>

  <script>
    function addPost() {
      const url = document.getElementById("url").value;
      const feed = document.getElementById("feed");

      if (!url) return alert("Link gir!");

      let embedHTML = "";

      // 🎥 YouTube linki
      if (url.includes("youtube.com") || url.includes("youtu.be")) {
        let videoId = "";

        if (url.includes("youtu.be")) {
          videoId = url.split("/").pop();
        } else {
          const urlParams = new URLSearchParams(url.split("?")[1]);
          videoId = urlParams.get("v");
        }

        embedHTML = `
          <iframe 
            src="https://www.youtube.com/embed/${videoId}" 
            allowfullscreen>
          </iframe>
        `;
      }

      // 📸 Instagram linki
      else if (url.includes("instagram.com")) {
        embedHTML = `
          <blockquote class="instagram-media" data-instgrm-permalink="${url}" data-instgrm-version="14"></blockquote>
          <script async src="//www.instagram.com/embed.js"><\/script>
        `;
      }

      else {
        embedHTML = "<p>❌ Sadece YouTube veya Instagram linki desteklenir</p>";
      }

      const post = document.createElement("div");
      post.className = "post";
      post.innerHTML = embedHTML;

      feed.prepend(post);

      document.getElementById("url").value = "";
    }
  </script>

</body>
</html>
