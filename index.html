<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sosyal Medya Eğitim Platformu</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    .container {
      width: 700px;
      margin: auto;
      margin-top: 30px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-top: 15px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .post {
      background: white;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border-radius: 10px;
    }

    .ig-box {
      padding: 20px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📱 Sosyal Medya Eğitim Platformu</h2>

<div class="container">

  <input id="url" placeholder="YouTube veya Instagram linki">
  <button onclick="addPost()">Paylaş</button>

  <div id="feed"></div>

</div>

<script>
function addPost() {
  const url = document.getElementById("url").value;
  const feed = document.getElementById("feed");

  if (!url) return alert("Link gir!");

  let content = "";

  // 🎥 YouTube
  if (url.includes("youtube.com") || url.includes("youtu.be")) {
    let videoId = "";

    if (url.includes("youtu.be")) {
      videoId = url.split("/").pop();
    } else {
      const params = new URLSearchParams(url.split("?")[1]);
      videoId = params.get("v");
    }

    content = `
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
    `;
  }

  // 📸 Instagram (çalışan yöntem)
  else if (url.includes("instagram.com")) {
    content = `
      <div class="ig-box">
        <p>📸 Instagram içerik</p>
        <a href="${url}" target="_blank">Gönderiyi aç</a>
      </div>
    `;
  }

  else {
    content = "<p>❌ Sadece YouTube veya Instagram linki</p>";
  }

  const post = document.createElement("div");
  post.className = "post";
  post.innerHTML = content;

  feed.prepend(post);

  document.getElementById("url").value = "";
}
</script>

</body>
</html>
