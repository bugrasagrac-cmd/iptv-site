<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ana Sayfa</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef0f3;
}

.nav{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container{
    padding:20px;
}

.post{
    background:white;
    margin-bottom:20px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.media img, .media video{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
    <div>🔥 Ana Sayfa</div>
    <a href="admin.html" style="color:white;">Admin Giriş</a>
</div>

<div class="container" id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p=>{
        let mediaHTML = "";

        p.files.forEach(f=>{
            if(f.type === "image"){
                mediaHTML += `<img src="${f.data}">`;
            } else if(f.type === "video"){
                mediaHTML += `
                <video controls>
                    <source src="${f.data}">
                </video>`;
            }
        });

        feed.innerHTML += `
        <div class="post">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            <div class="media">${mediaHTML}</div>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
