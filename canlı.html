<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Benim Video Kasam</title>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
input { margin:20px; }
video { width:90%; margin-top:20px; border-radius:10px; }
</style>
</head>
<body>

<h2>📁 Video Arşivim</h2>

<input type="file" accept="video/*" multiple onchange="loadVideos(event)">

<div id="list"></div>

<script>
function loadVideos(event){
  const files = event.target.files;
  const list = document.getElementById("list");
  list.innerHTML = "";

  for(let file of files){
    const url = URL.createObjectURL(file);

    const video = document.createElement("video");
    video.src = url;
    video.controls = true;

    list.appendChild(video);
  }
}
</script>

</body>
</html>
