<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Image Generator</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  width: 700px;
  margin: auto;
  margin-top: 50px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  padding: 12px 20px;
  margin-top: 15px;
  background: #00e5ff;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

pre {
  background: black;
  color: #00ff88;
  padding: 15px;
  margin-top: 20px;
  text-align: left;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>🎨 AI Image Prompt Builder</h2>

<div class="container">

<input id="idea" placeholder="Ne çizilsin? (örn: cyberpunk şehir)">

<select id="style">
  <option value="realistic">Realistic</option>
  <option value="anime">Anime</option>
  <option value="3d render">3D Render</option>
  <option value="pixel art">Pixel Art</option>
</select>

<button onclick="generate()">🚀 Prompt Oluştur</button>

<pre id="output">Hazır...</pre>

</div>

<script>
function generate(){

  const idea = document.getElementById("idea").value;
  const style = document.getElementById("style").value;

  if(!idea){
    alert("Bir fikir yaz");
    return;
  }

  const prompt =
`A highly detailed ${style} image of ${idea}.
Ultra realistic, cinematic lighting, 4k, high detail, professional composition.
No text, no watermark.`;

  document.getElementById("output").innerText = prompt;
}
</script>

</body>
</html>
