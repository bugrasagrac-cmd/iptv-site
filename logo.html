<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ÇATLI TV</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* LOGO */
.logo{
  position:relative;
  font-size:48px;
  font-weight:bold;
  font-family:Arial;
  color:white;
}

/* SİMLİ YAZI */
.text{
  background:linear-gradient(270deg,#FFD700,#00FFFF,#FFD700);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 4s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* TOP */
.ball{
  position:absolute;
  left:-60px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  animation:shoot 2s linear infinite;
}

@keyframes shoot{
  0%{ left:-60px; opacity:1;}
  50%{ left:50%; }
  100%{ left:110%; opacity:0;}
}

/* PATLAMA */
.hit{
  position:absolute;
  left:52%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  opacity:0;
  animation:hit 2s linear infinite;
}

@keyframes hit{
  0%,45%,100%{opacity:0}
  50%{opacity:1}
}

/* Ç PARLAMA */
.cflash{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  color:#00ffff;
  opacity:0;
  animation:cflash 2s linear infinite;
}

@keyframes cflash{
  0%,55%,100%{opacity:0}
  60%{opacity:1; text-shadow:0 0 20px #0ff;}
}
</style>

</head>

<body>

<div class="logo">
  <span class="text">ÇATLI TV</span>

  <!-- ⚽ -->
  <div class="ball">⚽</div>

  <!-- 💥 -->
  <div class="hit">💥</div>

  <!-- Ç FLASH -->
  <div class="cflash">Ç</div>
</div>

</body>
</html>
