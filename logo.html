<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ÇATLI TV Intro</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* FUTBOLCU */
.player{
  position:absolute;
  left:20%;
  bottom:20%;
  width:60px;
  height:120px;
  background:white;
  clip-path: polygon(50% 0%, 70% 20%, 60% 50%, 80% 100%, 60% 100%, 50% 70%, 40% 100%, 20% 100%, 40% 50%, 30% 20%);
  animation:kick 2s infinite;
}

/* AYAK HAREKETİ */
@keyframes kick{
  0%{transform:rotate(0deg)}
  50%{transform:rotate(10deg)}
  100%{transform:rotate(0deg)}
}

/* TOP */
.ball{
  position:absolute;
  left:23%;
  bottom:22%;
  font-size:30px;
  animation:shoot 2s infinite;
}

@keyframes shoot{
  0%{transform:translate(0,0)}
  50%{transform:translate(200px,-50px)}
  100%{transform:translate(600px,-80px); opacity:0}
}

/* LOGO */
.logo{
  position:absolute;
  font-size:50px;
  font-weight:bold;
  color:white;
  opacity:0;
  animation:logoShow 2s infinite;
}

@keyframes logoShow{
  0%,60%{opacity:0; transform:scale(0.5)}
  70%{opacity:1; transform:scale(1.2)}
  100%{opacity:1; transform:scale(1)}
}

/* SİMLİ */
.text{
  background:linear-gradient(270deg,#FFD700,#00FFFF,#FFD700);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 4s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:300%}
}
</style>
</head>

<body>

<div class="player"></div>
<div class="ball">⚽</div>

<div class="logo">
  <span class="text">ÇATLI TV</span>
</div>

</body>
</html>
