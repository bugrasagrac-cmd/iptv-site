<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ÇATLI TV</title>

<style>
body{
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  overflow:hidden;
}

/* LOGO */
.logo{
  position:relative;
  font-size:50px;
  font-weight:bold;
  font-family:Arial;
  letter-spacing:5px;
  color:white;
}

/* SİMLİ */
.text{
  background:linear-gradient(270deg,#FFD700,#00FFFF,#FFD700);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 5s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* TOP */
.ball{
  position:absolute;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  animation:shoot 2s linear infinite;
}

@keyframes shoot{
  0%{
    left:-100px;
    transform:translateY(-50%) scale(0.8);
  }
  40%{
    left:40%;
    transform:translateY(-50%) scale(1.2);
  }
  70%{
    left:55%;
    transform:translateY(-50%) scale(1);
  }
  100%{
    left:120%;
    transform:translateY(-50%) scale(0.5);
  }
}

/* PATLAMA */
.impact{
  position:absolute;
  left:52%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  opacity:0;
  animation:impact 2s linear infinite;
}

@keyframes impact{
  0%,50%,100%{opacity:0}
  55%{opacity:1; transform:translate(-50%,-50%) scale(1.5)}
}

/* Ç PARLAMA */
.c-glow{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  color:#0ff;
  opacity:0;
  animation:cGlow 2s linear infinite;
}

@keyframes cGlow{
  0%,60%,100%{opacity:0}
  65%{opacity:1; text-shadow:0 0 20px #0ff;}
}
</style>

</head>

<body>

<div class="logo">
  <span class="text">ÇATLI TV</span>

  <!-- ⚽ TOP -->
  <div class="ball">⚽</div>

  <!-- 💥 ÇARPMA -->
  <div class="impact">💥</div>

  <!-- 🔤 Ç PARLAMA -->
  <div class="c-glow">Ç</div>
</div>

</body>
</html>
