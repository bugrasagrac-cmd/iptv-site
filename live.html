<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Smart Prompt Generator</title>
<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  width: 700px;
  margin: auto;
  margin-top: 40px;
}

input {
  width: 100%;
  padding: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
  background: #00e5ff;
  border: none;
  font-weight: bold;
}

pre {
  background: black;
  color: lime;
  padding: 15px;
  margin-top: 20px;
  text-align: left;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>🧠 Smart Prompt Generator (Random Pro)</h2>

<div class="container">

<input id="idea" placeholder="Örn: kahve sitesi, oyun app, logo tasarım">

<br>
<button onclick="generate()">🎯 Prompt Üret</button>

<pre id="output"></pre>

</div>

<script>
function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const idea = document.getElementById("idea").value;
  if (!idea) return alert("Bir fikir yaz");

  const roles = [
    "sen kıdemli bir yazılım mimarısın",
    "sen üst düzey bir UI/UX uzmanısın",
    "sen Google seviyesinde bir ürün tasarımcısısın",
    "sen profesyonel full-stack geliştiricisin"
  ];

  const styles = [
    "modern ve minimal tasarım kullan",
    "premium ve high-end UI oluştur",
    "Apple tasarım dili kullan",
    "startup seviyesinde hızlı ve temiz UI yap"
  ];

  const rules = [
    "mobil uyumlu olsun",
    "SEO uyumlu yapı kur",
    "component bazlı düşün",
    "performans odaklı geliştir",
    "gerçek kullanıcı deneyimine odaklan"
  ];

  const extras = [
    "animasyonlar ekle",
    "dark mode desteği ekle",
    "interaktif UI oluştur",
    "gerçek dünya kullanılabilirliği yüksek olsun",
    "micro-interactions ekle"
  ];

  const prompt =
`${random(roles)}.

Görev: "${idea}" için profesyonel bir proje üret.

Zorunlu stil:
- ${random(styles)}

Kurallar:
- ${random(rules)}
- ${random(rules)}

Ekstra istekler:
- ${random(extras)}
- ${random(extras)}

Çıktı formatı:
- sadece çalışır HTML/CSS/JS üret
- açıklama yazma
- production kalitesinde olsun
`;

  document.getElementById("output").innerText = prompt;
}
</script>

</body>
</html>
