<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Super Prompt Builder</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  width: 700px;
  margin: auto;
  margin-top: 30px;
}

textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 15px;
  cursor: pointer;
  background: #00c2ff;
  border: none;
  color: black;
  font-weight: bold;
}

pre {
  background: #000;
  color: #0f0;
  padding: 15px;
  margin-top: 20px;
  text-align: left;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>🧠 Ultra Prompt Builder</h2>

<div class="container">

  <textarea id="idea" placeholder="Ne yapmak istiyorsun? (örnek: e-ticaret sitesi, logo, uygulama)"></textarea>

  <select id="type">
    <option value="web">Web Site</option>
    <option value="app">Mobil App</option>
    <option value="ai">AI Prompt</option>
    <option value="design">Tasarım</option>
  </select>

  <button onclick="generate()">🚀 Mükemmel Prompt Oluştur</button>

  <pre id="output"></pre>

</div>

<script>
function generate() {
  const idea = document.getElementById("idea").value;
  const type = document.getElementById("type").value;

  let prompt = "";

  if (!idea) {
    alert("Bir fikir yaz");
    return;
  }

    prompt = `

- HTML, CSS, JavaScript kullan
- Mobil uyumlu olsun
- Modern UI (dark/light uyumlu)
- UX odaklı tasarım
- SEO uyumlu yapı
- Gerçek dünya kullanılabilirliği yüksek olsun

Ekstra:
- Animasyonlar ekle
- Profesyonel layout kullan
- Component bazlı düşün
`;
  }

  else if (type === "app") {
    prompt = `

Görev: ${idea} için bir mobil uygulama tasarla.

Gereksinimler:
- UI modern olmalı
- Kullanıcı deneyimi yüksek olmalı
- React Native veya Flutter mantığına uygun düşün
- Basit ama güçlü yapı
- Gerçek kullanıcı problemi çözmeli
`;
  }

  else if (type === "ai") {
    prompt = `
Sen ileri seviye bir AI prompt engineer'sın.

- Açık ve net talimatlar yaz
- Modeli yönlendir (role-based prompting)
- Örnek çıktı formatı ekle
- Gereksiz kelime kullanma
- Maksimum kalite hedefle
`;
