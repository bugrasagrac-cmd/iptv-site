<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Prompt Engine Global</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  width: 700px;
  margin: auto;
  margin-top: 40px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  padding: 12px 20px;
  margin-top: 15px;
  background: #00e5ff;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

pre {
  background: black;
  color: #00ff88;
  padding: 15px;
  margin-top: 20px;
  text-align: left;
  white-space: pre-wrap;
  height: 300px;
  overflow: auto;
}
</style>
</head>

<body>

<h2>🌍 Prompt Engine Global (Single HTML)</h2>

<div class="container">

<input id="idea" placeholder="Ne yapmak istiyorsun?">

<select id="type">
  <option value="web">Web Site</option>
  <option value="app">Mobil App</option>
  <option value="logo">Logo</option>
  <option value="ai">AI Task</option>
</select>

<button onclick="generate()">🚀 Prompt Üret</button>

<pre id="output">Hazır...</pre>

</div>

<script>

// 🔥 VARYASYON HAVUZU
const roles = [
"sen kıdemli yazılım mimarısın",
"sen Google UX tasarımcısısın",
"sen Apple design ekibindesin",
"sen senior full-stack geliştiricisin"
];

const styles = [
"modern ve minimal tasarım",
"premium high-end UI",
"Apple tarzı sade arayüz",
"startup hızlı UI"
];

const rules = [
"mobil-first tasarla",
"SEO uyumlu yap",
"component bazlı düşün",
"performans odaklı geliştir"
];

const extras = [
"micro animation ekle",
"dark mode ekle",
"yüksek UX akışı oluştur",
"interaktif UI tasarla"
];

// 🎲 random fonksiyon
function r(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate(){

  const idea = document.getElementById("idea").value;
  const type = document.getElementById("type").value;

  if(!idea){
    alert("Bir fikir yaz");
    return;
  }

  const prompt =
`${r(roles)}.

Görev: "${idea}" için ${type} alanında profesyonel bir ürün tasarla.

Tasarım:
- ${r(styles)}
- ${r(styles)}

Kurallar:
- ${r(rules)}
- ${r(rules)}
- ${r(rules)}

Ekstra:
- ${r(extras)}
- ${r(extras)}

Çıktı:
- sadece AI prompt üret
- kod yazma
- profesyonel seviyede olsun`;

  document.getElementById("output").innerText = prompt;
}
</script>

</body>
</html>
