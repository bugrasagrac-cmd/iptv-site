<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Knowledge Base</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  width: 700px;
  margin: auto;
  margin-top: 50px;
}

input {
  width: 100%;
  padding: 12px;
}

button {
  padding: 12px 20px;
  margin-top: 10px;
  background: #00e5ff;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.box {
  margin-top: 20px;
  background: black;
  padding: 15px;
  text-align: left;
  min-height: 100px;
}
</style>
</head>

<body>

<h2>📚 Soru-Cevap Veri Tabanı</h2>

<div class="container">

<input id="q" placeholder="Soru yaz (örn: Batuhan ne demek?)">

<button onclick="ask()">Sor</button>

<div class="box" id="ans">Cevap burada</div>

</div>

<script>

// 🧠 GERÇEK VERİ TABANI (JSON gibi)
const db = [
  {
    key: "batuhan",
    answer: "Batuhan ismi Türk kökenlidir ve 'batı hanı / güçlü lider' anlamına gelir."
  },
  {
    key: "güneş",
    answer: "Güneş bir yıldızdır ve Dünya'nın enerji kaynağıdır."
  },
  {
    key: "dünya",
    answer: "Dünya, Güneş sistemindeki yaşam barındıran gezegendir."
  },
  {
    key: "yapay zeka",
    answer: "Yapay zeka, insan düşünmesini taklit eden sistemlerdir."
  }
];

function ask(){
  const q = document.getElementById("q").value.toLowerCase();

  let found = db.find(item => q.includes(item.key));

  if(found){
    document.getElementById("ans").innerText = found.answer;
  } else {
    document.getElementById("ans").innerText = "Bu soru veri tabanında yok.";
  }
}
</script>

</body>
</html>
