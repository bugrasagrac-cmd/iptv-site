<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}
input, button {
  padding:10px;
  margin:5px;
  width:200px;
}
</style>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>Admin Giriş</h2>
<input id="pass" type="password" placeholder="Şifre">
<br>
<button onclick="giris()">Giriş</button>

<div id="panel" style="display:none;">
  <h2>Kanal Ekle</h2>

  <input id="name" placeholder="Kanal adı"><br>
  <input id="url" placeholder="M3U8 link"><br>

  <button onclick="ekle()">Ekle</button>
</div>

<script>
// 🔗 SUPABASE BAĞLANTI
const supabaseClient = window.supabase.createClient(
  "https://ycjhdiyvpymwlbycaznz.supabase.co",
  "sb_publishable_LcVi575CzFILIXI4-I9S7A_ZrptwTgn"
);

// 🔐 GİRİŞ
function giris(){
  const sifre = document.getElementById("pass").value;

  if(sifre === "1234"){
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Yanlış şifre");
  }
}

// ➕ KANAL EKLE
async function ekle(){
  const name = document.getElementById("name").value;
  const url = document.getElementById("url").value;

  if(!name || !url){
    alert("Boş bırakma");
    return;
  }

  const { error } = await supabaseClient
    .from("channels")
    .insert([{ name: name, url: url }]);

  if(error){
    alert("Hata: " + error.message);
  } else {
    alert("Eklendi");
  }
}
</script>

</body>
</html>
