<!DOCTYPE html>
<html>
<head>
<title>Kullanıcı Giriş</title>
</head>
<body>

<h2>Kullanıcı Girişi</h2>

<input type="text" id="user" placeholder="Kullanıcı adı"><br><br>
<input type="password" id="pass" placeholder="Şifre"><br><br>

<button onclick="login()">Giriş Yap</button>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(localStorage.getItem(u) == p){
    alert("Giriş başarılı");
  }else{
    alert("Hatalı giriş");
  }
}
</script>

</body>
</html>
