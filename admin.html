<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
input, button { padding:10px; margin:5px; width:250px; }
textarea { width:90%; height:200px; margin-top:20px; }
#panel { display:none; }
</style>
</head>

<body>

<h1>Admin Giriş</h1>

<input id="pass" type="password" placeholder="Şifre"><br>
<button onclick="giris()">Giriş Yap</button>

<div id="panel">
  <h2>Admin Panel</h2>

  <h3>Yayın Linki Gir</h3>
  <input id="link" placeholder="https://site-link.com"><br>

  <button onclick="olustur()">Kodu Oluştur</button>

  <h3>Oluşan Kod</h3>
  <textarea id="kod" readonly></textarea>
</div>

<script>

// BURADAN ŞİFREYİ DEĞİŞTİR
let adminSifre = "1234";

function giris(){
  let p = document.getElementById("pass").value;

  if(p == adminSifre){
    document.getElementById("panel").style.display="block";
  }else{
    alert("Yanlış şifre!");
  }
}

function olustur(){
  let link = document.getElementById("link").value;

  let code = `
<!DOCTYPE html>
<html>
<head>
<style>
body { margin:0; }
iframe {
  width:100%;
  height:100vh;
  border:none;
}
</style>
</head>
<body>

<iframe src="${link}"></iframe>

</body>
</html>
`;

  document.getElementById("kod").value = code;
}
</script>

</body>
</html>
