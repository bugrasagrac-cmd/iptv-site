<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}
.nav{background:#111;color:#fff;padding:15px;display:flex;justify-content:space-between;}
.container{padding:20px;}

.box{background:white;padding:15px;border-radius:10px;}
input,textarea{width:100%;padding:10px;margin:8px 0;}

button{width:100%;padding:10px;background:green;color:white;border:none;cursor:pointer;}

.post{background:white;margin-top:10px;padding:10px;border-radius:10px;}
.red{background:red;}
</style>
</head>

<body>

<div class="nav">
<div>Admin Panel</div>
<a href="index.html" style="color:white;">Site</a>
</div>

<div class="container">

<div id="login" class="box">
<h3>Giriş</h3>
<input type="password" id="pass">
<button onclick="login()">Giriş</button>
</div>

<div id="panel" style="display:none;">
<div class="box">
<h3>Yeni Post</h3>

<input id="title" placeholder="Başlık">
<textarea id="desc" placeholder="Açıklama"></textarea>
<input type="file" id="files" multiple accept="image/*,video/*">

<button onclick="add()">Paylaş</button>
</div>
</div>

</div>

<script>

let password = "1234";
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function login(){
    if(document.getElementById("pass").value === password){
        document.getElementById("login").style.display="none";
        document.getElementById("panel").style.display="block";
    } else {
        alert("Hatalı şifre");
    }
}

function add(){

    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let files = document.getElementById("files").files;

    let media = [];

    if(files.length === 0){
        save(title,desc,[]);
        return;
    }

    let loaded = 0;

    for(let i=0;i<files.length;i++){
        let reader = new FileReader();

        reader.onload = function(e){

            media.push({
                type: files[i].type.includes("video") ? "video" : "image",
                data: e.target.result
            });

            loaded++;

            if(loaded === files.length){
                save(title,desc,media);
            }
        }

        reader.readAsDataURL(files[i]);
    }
}

function save(title,desc,media){

    posts.unshift({
        title,
        desc,
        media
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("title").value="";
    document.getElementById("desc").value="";
    document.getElementById("files").value="";

    alert("Paylaşıldı!");
}

</script>

</body>
</html>
