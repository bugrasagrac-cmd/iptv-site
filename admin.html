<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="box" id="login">
  <h2>Admin Giriş</h2>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="giris()">Giriş Yap</button>
</div>

<!-- PANEL -->
<div class="box" id="panel" style="display:none;">
  <h2>Kanal Ekle</h2>
  <input id="name" placeholder="Kanal adı">
  <input id="url" placeholder="M3U8 link">
  <button onclick="ekle()">Ekle</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// 🔗 SUPABASE
const supabase = supabase.createClient(
  "https://ycjhdiyvpymwlbycaznz.supabase.co",
  "sb_publishable_LcVi575CzFILIXI4-I9S7A_ZrptwTgn"
);

// 🔐 GİRİŞ
function giris(){
  let p = document.getElementById("pass").value;

  if(p === "18991899"){
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Yanlış şifre!");
  }
}

// ➕ EKLE
async function ekle(){
  let name = document.getElementById("name").value;
  let url = document.getElementById("url").value;

  await supabase.from("channels").insert([{ name, url }]);

  alert("Eklendi!");
}
</script>

</body>
</html>
